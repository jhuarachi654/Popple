<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <filter id="paper-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#00000033"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="paper-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffef5"/>
      <stop offset="100%" stop-color="#faf9e8"/>
    </linearGradient>
  </defs>

  <!-- Background (like a table / counter) -->
  <rect width="600" height="800" fill="#d4c5a9"/>
  <rect width="600" height="800" fill="#c8b896" opacity="0.4"/>

  <!-- Paper sheet — slightly rotated -->
  <g transform="rotate(-2.5, 300, 400)" filter="url(#paper-shadow)">
    <rect x="60" y="60" width="480" height="680" rx="4" fill="url(#paper-grad)"/>

    <!-- Ruled lines -->
    <line x1="80" y1="140" x2="520" y2="140" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="192" x2="520" y2="192" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="244" x2="520" y2="244" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="296" x2="520" y2="296" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="348" x2="520" y2="348" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="400" x2="520" y2="400" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="452" x2="520" y2="452" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="504" x2="520" y2="504" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="556" x2="520" y2="556" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="608" x2="520" y2="608" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>
    <line x1="80" y1="660" x2="520" y2="660" stroke="#c8d4e8" stroke-width="1" opacity="0.6"/>

    <!-- Red margin line -->
    <line x1="118" y1="60" x2="118" y2="740" stroke="#f4a0a0" stroke-width="1.5" opacity="0.7"/>

    <!-- Title -->
    <text x="140" y="105" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#2d2d2d" transform="rotate(0.3, 140, 105)">To Do — this week</text>

    <!-- Task 1 -->
    <rect x="132" y="155" width="18" height="18" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <text x="162" y="170" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(-0.4, 162, 170)">Schedule dentist appt</text>

    <!-- Task 2 — checked -->
    <rect x="132" y="207" width="18" height="18" rx="3" fill="#4a9a6b" stroke="#3a7a55" stroke-width="2"/>
    <line x1="135" y1="216" x2="141" y2="222" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="141" y1="222" x2="150" y2="210" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="162" y="222" font-family="Georgia, serif" font-size="22" fill="#888" text-decoration="line-through" transform="rotate(0.2, 162, 222)">Buy groceries</text>

    <!-- Task 3 -->
    <rect x="132" y="259" width="18" height="18" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <text x="162" y="274" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(-0.5, 162, 274)">Reply to Sarah's email</text>

    <!-- Task 4 -->
    <rect x="132" y="311" width="18" height="18" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <text x="162" y="326" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(0.6, 162, 326)">Pick up dry cleaning</text>

    <!-- Task 5 — starred -->
    <text x="132" y="378" font-family="Georgia, serif" font-size="22" fill="#e8a020">★</text>
    <text x="162" y="378" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(-0.3, 162, 378)">Finish Q3 report draft</text>

    <!-- Task 6 -->
    <rect x="132" y="415" width="18" height="18" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <text x="162" y="430" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(0.4, 162, 430)">Call plumber re: leak</text>

    <!-- Task 7 -->
    <rect x="132" y="467" width="18" height="18" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <text x="162" y="482" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(-0.6, 162, 482)">Renew car insurance</text>

    <!-- Task 8 — checked -->
    <rect x="132" y="519" width="18" height="18" rx="3" fill="#4a9a6b" stroke="#3a7a55" stroke-width="2"/>
    <line x1="135" y1="528" x2="141" y2="534" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="141" y1="534" x2="150" y2="522" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="162" y="534" font-family="Georgia, serif" font-size="22" fill="#888" text-decoration="line-through" transform="rotate(0.2, 162, 534)">Return library books</text>

    <!-- Task 9 -->
    <rect x="132" y="571" width="18" height="18" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <text x="162" y="586" font-family="Georgia, serif" font-size="22" fill="#1a1a1a" transform="rotate(-0.3, 162, 586)">Book flight for Nov trip</text>

    <!-- Small side note -->
    <text x="132" y="650" font-family="Georgia, serif" font-size="14" fill="#888" transform="rotate(0.5, 132, 650)">* also check oil change!</text>

    <!-- Subtle paper texture overlay -->
    <rect x="60" y="60" width="480" height="680" rx="4" fill="white" opacity="0.04"/>
  </g>

  <!-- Tiny corner crease on paper -->
  <g transform="rotate(-2.5, 300, 400)">
    <polygon points="500,60 540,60 540,100" fill="#e8e4cc" opacity="0.5"/>
    <line x1="500" y1="60" x2="540" y2="100" stroke="#ccc" stroke-width="1"/>
  </g>
</svg>
